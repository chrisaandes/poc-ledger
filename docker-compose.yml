services:
  bendo-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bendo
      POSTGRES_PASSWORD: bendo123
      POSTGRES_DB: bendo_api
    ports:
      - "5433:5432"
    volumes:
      - bendo_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bendo -d bendo_api"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  bendo_data:
